<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epsilon Heckle | Red & Black Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --epsilon-red: #ff0000;
            --epsilon-dark-red: #8b0000;
            --epsilon-black: #0a0a0a;
            --epsilon-card: #151515;
        }

        body {
            background-color: var(--epsilon-black);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        .red-glow:hover {
            box-shadow: 0 0 15px var(--epsilon-red);
            border-color: var(--epsilon-red);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ff0000;
            border-radius: 10px;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #222;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #151515 25%, #222 50%, #151515 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .game-iframe-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
        }
        .game-iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="custom-scrollbar">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-red-600 rounded-lg">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-orbitron font-bold tracking-tighter">
                    EPSILON <span class="text-red-600">HECKLE</span>
                </h1>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-semibold uppercase tracking-widest">
                <a href="#" class="hover:text-red-500 transition-colors">Library</a>
                <a href="#" class="hover:text-red-500 transition-colors">Trending</a>
                <a href="#" class="hover:text-red-500 transition-colors">Admin: Warren</a>
            </div>
            <div class="flex items-center gap-4">
                <button id="searchToggle" class="p-2 hover:bg-zinc-800 rounded-full transition-all">
                    <i data-lucide="search" class="w-5 h-5 text-zinc-400"></i>
                </button>
                <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center font-bold">W</div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 max-w-7xl mx-auto px-4">
        
        <!-- Hero Section -->
        <div class="mb-12 relative overflow-hidden rounded-3xl bg-zinc-900 border border-zinc-800 h-[300px] flex items-center">
            <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-black via-transparent to-transparent"></div>
            <div class="relative z-10 p-10 max-w-2xl">
                <span class="bg-red-600 px-3 py-1 rounded text-xs font-bold uppercase mb-4 inline-block">Featured Site</span>
                <h2 class="text-5xl font-orbitron font-bold mb-4">STOP PLAYING TRASH.</h2>
                <p class="text-zinc-400 mb-6 italic">Warren's curated selection of the best free-to-play games on the web. No cap, just vibes.</p>
                <button onclick="scrollToGames()" class="bg-white text-black px-6 py-3 rounded-full font-bold hover:bg-red-600 hover:text-white transition-all">Browse Library</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-4 mb-8">
            <button class="px-6 py-2 bg-red-600 rounded-full text-sm font-bold">All Games</button>
            <button class="px-6 py-2 bg-zinc-900 border border-zinc-800 rounded-full text-sm font-bold hover:border-red-600 transition-all">MMO</button>
            <button class="px-6 py-2 bg-zinc-900 border border-zinc-800 rounded-full text-sm font-bold hover:border-red-600 transition-all">Shooter</button>
            <button class="px-6 py-2 bg-zinc-900 border border-zinc-800 rounded-full text-sm font-bold hover:border-red-600 transition-all">Anime</button>
        </div>

        <!-- Games Grid -->
        <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Loading States -->
            <div class="loading-shimmer h-64 rounded-2xl"></div>
            <div class="loading-shimmer h-64 rounded-2xl"></div>
            <div class="loading-shimmer h-64 rounded-2xl"></div>
            <div class="loading-shimmer h-64 rounded-2xl"></div>
        </div>

        <!-- Pagination -->
        <div class="mt-12 flex justify-center gap-4">
            <button id="prevBtn" class="p-3 bg-zinc-900 border border-zinc-800 rounded-xl hover:bg-red-600 disabled:opacity-50 disabled:hover:bg-zinc-900 transition-all">
                <i data-lucide="chevron-left"></i>
            </button>
            <button id="nextBtn" class="p-3 bg-zinc-900 border border-zinc-800 rounded-xl hover:bg-red-600 transition-all">
                <i data-lucide="chevron-right"></i>
            </button>
        </div>
    </main>

    <!-- Game Modal -->
    <div id="gameModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-4 md:inset-10 bg-zinc-950 border border-zinc-800 rounded-3xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
                <h3 id="modalTitle" class="text-xl font-orbitron font-bold text-red-600">Game Detail</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-red-600 rounded-lg transition-all">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="modalContent" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script>
        // API Proxy/Config
        // Note: FreeToGame API might have CORS issues client-side. 
        // In a real prod env, you'd use a small serverless proxy.
        const API_BASE = "https://www.freetogame.com/api";
        let currentPage = 0;
        const gamesPerPage = 12;
        let allGames = [];

        // Init Lucide
        lucide.createIcons();

        async function fetchGames() {
            try {
                // Fetching the whole list is faster than 500 individual ID requests
                // We'll then slice it for pagination
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(API_BASE + '/games')}`);
                allGames = await response.json();
                renderGames();
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('games-grid').innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i data-lucide="alert-triangle" class="w-12 h-12 text-red-600 mx-auto mb-4"></i>
                        <h3 class="text-xl font-bold">API is being salty.</h3>
                        <p class="text-zinc-500">FreeToGame API is likely blocking the request. (CORS issue)</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function renderGames() {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '';
            
            const start = currentPage * gamesPerPage;
            const end = start + gamesPerPage;
            const pageGames = allGames.slice(start, end);

            pageGames.forEach(game => {
                const card = document.createElement('div');
                card.className = "group relative bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden cursor-pointer transition-all hover:-translate-y-2 red-glow";
                card.onclick = () => openGame(game.id);
                
                card.innerHTML = `
                    <div class="relative h-48 overflow-hidden">
                        <img src="${game.thumbnail}" alt="${game.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-red-500 uppercase">
                            ${game.genre}
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-lg mb-1 truncate group-hover:text-red-500 transition-colors">${game.title}</h4>
                        <p class="text-zinc-500 text-xs line-clamp-2 mb-4">${game.short_description}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] text-zinc-400 uppercase tracking-widest">${game.platform}</span>
                            <div class="p-2 bg-zinc-800 rounded-lg group-hover:bg-red-600 transition-all">
                                <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = end >= allGames.length;
            
            lucide.createIcons();
        }

        async function openGame(id) {
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            
            modal.classList.remove('hidden');
            content.innerHTML = `<div class="flex items-center justify-center h-64"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-red-600"></div></div>`;

            try {
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(API_BASE + '/game?id=' + id)}`);
                const data = await response.json();

                title.innerText = data.title;
                content.innerHTML = `
                    <div class="flex flex-col lg:flex-row gap-8 p-6">
                        <div class="lg:w-2/3">
                            <div class="game-iframe-container rounded-2xl border border-red-900/50 shadow-2xl shadow-red-900/20">
                                <iframe src="${data.game_url}" title="${data.title}"></iframe>
                            </div>
                            <div class="mt-8">
                                <h4 class="text-2xl font-orbitron mb-4 text-white">About the game</h4>
                                <p class="text-zinc-400 leading-relaxed">${data.description}</p>
                            </div>
                        </div>
                        <div class="lg:w-1/3 space-y-6">
                            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                                <h5 class="text-red-500 font-bold uppercase text-xs mb-4">Specs & Info</h5>
                                <div class="space-y-4 text-sm">
                                    <div class="flex justify-between border-b border-zinc-800 pb-2">
                                        <span class="text-zinc-500">Developer</span>
                                        <span class="text-white">${data.developer}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-zinc-800 pb-2">
                                        <span class="text-zinc-500">Publisher</span>
                                        <span class="text-white">${data.publisher}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-zinc-800 pb-2">
                                        <span class="text-zinc-500">Release Date</span>
                                        <span class="text-white">${data.release_date}</span>
                                    </div>
                                    <div class="flex justify-between border-b border-zinc-800 pb-2">
                                        <span class="text-zinc-500">Genre</span>
                                        <span class="text-white">${data.genre}</span>
                                    </div>
                                </div>
                            </div>

                            <a href="${data.game_url}" target="_blank" class="block w-full text-center bg-red-600 py-4 rounded-xl font-bold hover:bg-red-700 transition-all uppercase tracking-widest">
                                Open Official Site
                            </a>

                            <div class="bg-zinc-900/50 p-6 rounded-2xl border border-zinc-800 border-dashed">
                                <h5 class="text-zinc-500 font-bold text-xs mb-4">System Requirements</h5>
                                <div class="text-[12px] text-zinc-400 space-y-2">
                                    ${data.minimum_system_requirements ? `
                                        <p><strong>OS:</strong> ${data.minimum_system_requirements.os}</p>
                                        <p><strong>Processor:</strong> ${data.minimum_system_requirements.processor}</p>
                                        <p><strong>Memory:</strong> ${data.minimum_system_requirements.memory}</p>
                                        <p><strong>Graphics:</strong> ${data.minimum_system_requirements.graphics}</p>
                                    ` : 'Web Based / No requirements listed.'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `<div class="p-20 text-center text-red-500">Failed to load game details.</div>`;
            }
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('gameModal').classList.add('hidden');
            document.getElementById('modalContent').innerHTML = '';
        }

        function scrollToGames() {
            document.getElementById('games-grid').scrollIntoView({ behavior: 'smooth' });
        }

        // Event Listeners
        document.getElementById('prevBtn').onclick = () => {
            if (currentPage > 0) {
                currentPage--;
                renderGames();
                scrollToGames();
            }
        };

        document.getElementById('nextBtn').onclick = () => {
            if ((currentPage + 1) * gamesPerPage < allGames.length) {
                currentPage++;
                renderGames();
                scrollToGames();
            }
        };

        // Start
        window.onload = fetchGames;

    </script>
</body>
</html>
